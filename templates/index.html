<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="bg-shape bg-1"></div>
  <div class="bg-shape bg-2"></div>

  <main class="layout">
    <aside class="panel sessions-panel">
      <h2>Session</h2>
      <button id="newChatBtn" class="btn btn-danger">New Chat</button>
      <button id="clearChatBtn" class="btn btn-light">Clear Chat</button>
      <div id="chatList" class="chat-list"></div>
    </aside>

    <section class="panel chat-panel">
      <h1 id="chatTitle">Voice Assistant</h1>
      <div id="chatMessages" class="messages"></div>
    </section>

    <aside class="panel controls-panel">
      <h2>Voice On</h2>
      <button id="micBtn" class="mic-btn" title="Start recording">🎙</button>
      <p id="micStatus" class="muted">Start Talking</p>

      <h2>Stop AI</h2>
      <button id="stopAudioBtn" class="btn btn-light">Stop AI</button>
      <p class="muted">Stop AI Speaking</p>
    </aside>
  </main>

  <audio id="aiAudio" hidden></audio>
  <script src="/static/app.js"></script>
</body>
</html>
